name: Auto reviews, merge and close pull requests

on:
  pull_request:
    types:
      - opened
      - reopened
jobs:
  auto-merge:
    name: Auto reviews pull requests from bots
    runs-on: ubuntu-22.04
    timeout-minutes: 5

    permissions:
      pull-requests: write
    steps:
      - name: Print event
        run: echo "${GITHUB}" | jq
        env:
          GITHUB: ${{ toJson(github) }}
      - name: Print context
        uses: actions/github-script@v9
        with:
          script: |-
            console.log(context);
      - name: Auto reviews GHCI updates
        uses: actions/github-script@v9
        if: |-
          startsWith(github.head_ref, 'ghci/audit/')
          && (github.event.pull_request.user.login == 'geo-ghci-test[bot]'
            || github.event.pull_request.user.login == 'geo-ghci-int[bot]'
            || github.event.pull_request.user.login == 'geo-ghci[bot]')
        with:
          script: |-
            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                event: 'APPROVE',
              });
            } catch (error) {
              if (
                error?.status === 422
                && (error?.message || '').includes('not permitted to approve pull requests')
              ) {
                core.notice('Auto-approval skipped: GitHub Actions is not allowed to approve pull requests.');
              } else {
                throw error;
              }
            }
      - name: Auto reviews Renovate updates
        uses: actions/github-script@v9
        if: |-
          github.event.pull_request.user.login == 'renovate[bot]'
        with:
          script: |-
            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                event: 'APPROVE',
              });
            } catch (error) {
              if (
                error?.status === 422
                && (error?.message || '').includes('not permitted to approve pull requests')
              ) {
                core.notice('Auto-approval skipped: GitHub Actions is not allowed to approve pull requests.');
              } else {
                throw error;
              }
            }
